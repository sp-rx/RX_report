<!DOCTYPE html>
<html>
<head>
  <title>Send Photos</title>
</head>
<body>

<h2>Send Photos</h2>

<input type="file" id="photos" multiple accept="image/*">

<br><br>

<button onclick="openGmail()">Send to Kiara Optometry</button>

<script>
function openGmail() {
  const subject = encodeURIComponent("Patient Photos");
  const body = encodeURIComponent("Photos attached.");

  const url = "https://mail.google.com/mail/?view=cm&fs=1&to=kiara.optometry.px@gmail.com"
              + "&su=" + subject
              + "&body=" + body;

  window.open(url, "_blank");
}
</script>

</body>
</html>
