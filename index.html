<!DOCTYPE html>
<html>
<head>
  <title>Send Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<style>
input, button {
border-radius:10px;
border:1px solid grey
}

</style>
<body>

<h2>Send Patient Details</h2>

<label>Patient Name:</label><br>
<input style="width:99%; height:40px" type="text" id="name" placeholder="Enter name"><br><br>

<label>WhatsApp Number:</label><br>
<input style="width:99%; height:40px" type="tel" id="phone" placeholder="Enter WhatsApp number"><br><br>

<br>

<button style="width:45%; height:40px" onclick="sendMailApp()">Send via Phone</button>
<button style="width:45%; height:40px" onclick="sendGmail()">Send via PC</button>

<script>
function getDetails() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!name || !phone) {
    alert("Fill in name and WhatsApp number");
    return null;
  }

  const subject = name + " - " + phone;

  const body =
    "Name: " + name + "\n" +
    "WhatsApp: " + phone + "\n\n";

  return { subject, body };
}

// Apple Mail (mailto)
function sendMailApp() {
  const data = getDetails();
  if (!data) return;

  const subject = encodeURIComponent(data.subject);
  const body = encodeURIComponent(data.body);

  window.location.href =
    "mailto:kiara.optometry.px@gmail.com?subject=" + subject + "&body=" + body;
}

// Gmail (web)
function sendGmail() {
  const data = getDetails();
  if (!data) return;

  const subject = encodeURIComponent(data.subject);
  const body = encodeURIComponent(data.body);

  const url = "https://mail.google.com/mail/?view=cm&fs=1&to=kiara.optometry.px@gmail.com"
              + "&su=" + subject
              + "&body=" + body;

  window.open(url, "_blank");
}
</script>

</body>
</html>
