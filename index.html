<h2>Input Form</h2>

<input id="name" placeholder="Name"><br>
<input id="sph" placeholder="SPH"><br>
<input id="cyl" placeholder="CYL"><br>
<input id="axis" placeholder="AXIS"><br>

<button onclick="saveData()">Save</button>

<h2>Records</h2>
<div id="output"></div>

<button onclick="loadData()">Load Data</button>



<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzZ8THUglmOUn9PvDFcdbpycoMQTOA8qGCwDqAQi-uMl8pUDw4mWqOHbR4PCvuGMowm/exec";

function saveData(){
  const data = {
    name: document.getElementById("name").value,
    sph: document.getElementById("sph").value,
    cyl: document.getElementById("cyl").value,
    axis: document.getElementById("axis").value
  };

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    alert("Saved");
    loadData(); // auto refresh
  })
  .catch(err => console.error(err));
}

function loadData(){
  fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(d => {
      html += `<div>${d.Name || ""} | ${d.SPH || ""} | ${d.CYL || ""} | ${d.AXIS || ""}</div>`;
    });
    document.getElementById("output").innerHTML = html;
  })
  .catch(err => console.error(err));
}
</script>
