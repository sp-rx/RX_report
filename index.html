<!DOCTYPE html>
<html>
<head>
  <title>Send Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Send Photos</h2>

<input type="file" id="photos" multiple accept="image/*" capture="environment">

<br><br>

<button onclick="sendEmail()">Send</button>

<script>
function sendEmail() {
  const subject = encodeURIComponent("Patient Photos");
  const body = encodeURIComponent("Photos attached.");

  window.location.href =
    "mailto:kiara.optometry.px@gmail.com?subject=" + subject + "&body=" + body;
}
</script>

</body>
</html>
