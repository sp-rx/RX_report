<h2>Input Form</h2>

<input id="name" placeholder="Name"><br>
<input id="sph" placeholder="SPH"><br>
<input id="cyl" placeholder="CYL"><br>
<input id="axis" placeholder="AXIS"><br>

<button onclick="saveData()">Save</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwV14NokUysyyHf1bbmymGIQbedaOSxV2_hvmbK7EzoCCQuHvc2a4ici8FVKDOm-QK4/exec";

function saveData(){
  const data = {
    name: document.getElementById("name").value,
    sph: document.getElementById("sph").value,
    cyl: document.getElementById("cyl").value,
    axis: document.getElementById("axis").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => alert("Saved"));
}
</script>

<h2>Records</h2>
<div id="output"></div>

<button onclick="loadData()">Load Data</button>

<script>
function loadData(){
  fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(d => {
      html += `
        <div>
          ${d.Name} | ${d.SPH} | ${d.CYL} | ${d.AXIS}
        </div>
      `;
    });
    document.getElementById("output").innerHTML = html;
  });
}
</script>
